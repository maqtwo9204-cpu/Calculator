<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カレンダー自動登録</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #0f0f14;
  color: #e8e4dd;
  font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
  padding: 24px 16px 60px;
  -webkit-font-smoothing: antialiased;
}

.wrap { max-width: 480px; margin: 0 auto; }

.eyebrow {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: #4b5563;
  text-transform: uppercase;
  margin-bottom: 8px;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  color: #f0ebe3;
  line-height: 1.3;
  margin-bottom: 32px;
}
.step-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: #4b5563;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* Mode */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
.mode-btn {
  background: #1a1a24; border: 1.5px solid #2a2a38; border-radius: 12px;
  padding: 16px 12px; cursor: pointer; color: #9ca3af;
  text-align: left; transition: all 0.15s; width: 100%;
}
.mode-btn:hover { border-color: #3b5bdb; }
.mode-btn.active { background: #1e3a8a; border-color: #3b82f6; color: #e0eaff; }
.mode-btn .icon { font-size: 22px; margin-bottom: 6px; display: block; }
.mode-btn .btn-title { font-weight: 700; font-size: 14px; display: block; margin-bottom: 4px; color: #d1d5db; }
.mode-btn.active .btn-title { color: #fff; }
.mode-btn .btn-sub { font-size: 11px; line-height: 1.6; white-space: pre-line; color: #6b7280; }
.mode-btn.active .btn-sub { color: #93c5fd; }

/* Upload */
.section-block { margin-bottom: 28px; display: none; }
.section-block.visible { display: block; }
.upload-area {
  border: 1.5px dashed #2a2a38; border-radius: 12px; padding: 28px;
  text-align: center; cursor: pointer; background: #13131c; transition: border-color 0.15s;
}
.upload-area:hover { border-color: #3b82f6; }
.upload-area .upload-icon { font-size: 32px; display: block; margin-bottom: 8px; }
.upload-area .upload-hint { color: #6b7280; font-size: 13px; }
#preview-img { max-width: 100%; max-height: 220px; border-radius: 8px; object-fit: contain; display: none; }
#file-input { display: none; }

/* Buttons */
.btn {
  width: 100%; padding: 14px; border-radius: 10px; border: none;
  font-weight: 700; font-size: 15px; cursor: pointer; margin-bottom: 12px;
  transition: opacity 0.15s, background 0.15s; display: none; font-family: inherit;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn.visible { display: block; }
.btn-analyze { background: #1d4ed8; color: #fff; }
.btn-register { background: #059669; color: #fff; }
.btn-cancel {
  background: transparent; border: 1px solid #374151; color: #9ca3af;
  font-size: 13px; font-weight: 500; padding: 10px;
}

/* Edit table — シフト */
.edit-header {
  display: grid; grid-template-columns: 44px 36px 1fr 32px;
  gap: 6px; font-size: 11px; color: #4b5563;
  padding: 8px 12px; border-bottom: 1px solid #2a2a38;
}
.edit-row {
  display: grid; grid-template-columns: 44px 36px 1fr 32px;
  gap: 6px; align-items: center;
  padding: 5px 12px; border-bottom: 1px solid #1a1a24;
  transition: background 0.1s;
}
.edit-row:hover { background: #16161f; }
.edit-row.rest-row { background: #1a160080; }
.edit-row .day-num { font-size: 13px; color: #9ca3af; }
.edit-row .dow-cell { font-size: 12px; }
.dow-sun { color: #ef4444; }
.dow-sat { color: #60a5fa; }
.dow-other { color: #6b7280; }
.code-select {
  background: #0f0f14; border: 1px solid #2a2a38; border-radius: 6px;
  color: #e8e4dd; font-size: 13px; font-weight: 600; padding: 4px 6px;
  cursor: pointer; width: 100%; font-family: inherit;
}
.code-select.is-rest { color: #eab308; background: #1a1600; border-color: #3a3000; }
.del-btn {
  background: none; border: none; color: #374151; cursor: pointer;
  font-size: 15px; padding: 2px; line-height: 1; transition: color 0.1s;
}
.del-btn:hover { color: #ef4444; }

/* Edit cards — personal */
.edit-card {
  background: #13131c; border: 1px solid #2a2a38; border-radius: 10px;
  padding: 14px; margin-bottom: 10px; position: relative;
}
.edit-card label { font-size: 10px; color: #4b5563; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
.edit-input {
  background: #0f0f14; border: 1px solid #2a2a38; border-radius: 6px;
  color: #e8e4dd; font-size: 13px; padding: 7px 10px;
  width: 100%; margin-bottom: 10px; font-family: inherit;
}
.edit-input:focus { outline: none; border-color: #3b82f6; }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.card-del {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: #374151; cursor: pointer; font-size: 16px;
}
.card-del:hover { color: #ef4444; }
.add-row-btn {
  width: 100%; padding: 10px; border-radius: 8px;
  border: 1px dashed #2a2a38; background: transparent;
  color: #6b7280; font-size: 13px; cursor: pointer; margin-bottom: 16px;
  transition: border-color 0.15s, color 0.15s; font-family: inherit;
}
.add-row-btn:hover { border-color: #3b82f6; color: #93c5fd; }

/* Preview meta */
.preview-meta { margin-top: 10px; font-size: 11px; color: #6b7280; display: flex; gap: 16px; flex-wrap: wrap; }

/* Confirm banner */
.confirm-banner {
  background: #0c1a0c; border: 1px solid #166534; border-radius: 12px;
  padding: 16px; margin-bottom: 12px; display: none;
}
.confirm-banner.visible { display: block; }
.confirm-banner .conf-title { font-size: 13px; color: #4ade80; font-weight: 700; margin-bottom: 6px; }
.confirm-banner .conf-body { font-size: 12px; color: #86efac; line-height: 1.7; }
.confirm-btns { display: flex; gap: 8px; margin-top: 12px; }
.confirm-btns .btn-yes {
  flex: 1; padding: 11px; border-radius: 8px; border: none;
  background: #059669; color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit;
}
.confirm-btns .btn-no {
  padding: 11px 18px; border-radius: 8px; border: 1px solid #374151;
  background: transparent; color: #9ca3af; font-size: 13px; cursor: pointer; font-family: inherit;
}

/* Result */
.result-box { border-radius: 12px; padding: 16px; margin-bottom: 12px; display: none; }
.result-box.visible { display: block; }
.result-box.success { background: #052e16; border: 1px solid #166534; }
.result-box.error { background: #1a0505; border: 1px solid #7f1d1d; }
.result-box .res-title { font-weight: 700; margin-bottom: 8px; font-size: 14px; }
.result-box.success .res-title { color: #4ade80; }
.result-box.error .res-title { color: #fca5a5; }
.result-box .res-body { font-size: 12px; line-height: 1.7; white-space: pre-wrap; }
.result-box.success .res-body { color: #86efac; }
.result-box.error .res-body { color: #fca5a5; }

/* Spinner */
.spinner {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.table-scroll { max-height: 320px; overflow-y: auto; }
.table-wrap { background: #13131c; border-radius: 12px; border: 1px solid #2a2a38; overflow: hidden; }
</style>
</head>
<body>
<div class="wrap">

  <div class="eyebrow">Calendar Auto-Register</div>
  <h1>画像からカレンダーへ</h1>

  <!-- STEP 1: 種別 -->
  <div class="step-label">STEP 1　登録する種類を選択</div>
  <div class="mode-grid">
    <button class="mode-btn" id="btn-shift" onclick="selectMode('shift')">
      <span class="icon">📋</span>
      <span class="btn-title">シフト</span>
      <span class="btn-sub">出勤 → マイカレ
休み → 共有</span>
    </button>
    <button class="mode-btn" id="btn-personal" onclick="selectMode('personal')">
      <span class="icon">📅</span>
      <span class="btn-title">私的な予定</span>
      <span class="btn-sub">共有カレンダーへ</span>
    </button>
  </div>

  <!-- STEP 2: アップロード -->
  <div class="section-block" id="upload-section">
    <div class="step-label">STEP 2　画像をアップロード</div>
    <div class="upload-area" onclick="document.getElementById('file-input').click()" id="upload-area">
      <span class="upload-icon" id="upload-icon">📸</span>
      <span class="upload-hint" id="upload-hint">タップして画像を選択</span>
      <img id="preview-img" alt="preview">
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">
  </div>

  <!-- STEP 3: 解析ボタン -->
  <div class="section-block" id="analyze-section">
    <div class="step-label">STEP 3　画像を解析</div>
    <button class="btn btn-analyze visible" id="btn-analyze" onclick="analyzeImage()">🔍 画像を解析する</button>
  </div>

  <!-- STEP 4: 編集 -->
  <div class="section-block" id="edit-section">
    <div class="step-label" id="edit-label">STEP 4　内容を確認・修正</div>

    <!-- シフト編集テーブル -->
    <div id="shift-editor" style="display:none">
      <div class="table-wrap">
        <div class="edit-header">
          <span>日</span><span>曜</span><span>区分</span><span></span>
        </div>
        <div class="table-scroll" id="shift-rows"></div>
      </div>
      <div class="preview-meta" id="shift-meta"></div>
    </div>

    <!-- 私的な予定編集 -->
    <div id="personal-editor" style="display:none">
      <div id="event-cards"></div>
      <button class="add-row-btn" onclick="addEventCard()">＋ 予定を追加</button>
    </div>

    <!-- 確認ボタン -->
    <div style="margin-top:16px; display:flex; gap:8px;">
      <button class="btn btn-register visible" id="btn-confirm" onclick="showConfirm()" style="margin-bottom:0; flex:1;">
        この内容で登録する →
      </button>
      <button class="btn btn-cancel visible" id="btn-reanalyze" onclick="reAnalyze()" style="margin-bottom:0; width:auto; padding:14px 16px;">
        再解析
      </button>
    </div>
  </div>

  <!-- 確認バナー -->
  <div class="confirm-banner" id="confirm-banner">
    <div class="conf-title">📋 登録内容の最終確認</div>
    <div class="conf-body" id="confirm-body"></div>
    <div class="confirm-btns">
      <button class="btn-yes" onclick="registerToCalendar()">✅ 登録する</button>
      <button class="btn-no" onclick="closeConfirm()">← 戻って修正</button>
    </div>
  </div>

  <!-- 登録中 -->
  <div id="registering-msg" style="display:none; text-align:center; padding:20px; color:#6b7280; font-size:14px;">
    <span class="spinner"></span>Googleカレンダーに登録中...
  </div>

  <!-- 結果 -->
  <div class="result-box" id="result-box">
    <div class="res-title" id="result-title"></div>
    <div class="res-body" id="result-body"></div>
  </div>
  <button class="btn btn-cancel visible" id="btn-reset" style="display:none;" onclick="resetAll()">
    続けて登録する
  </button>

</div>

<script>
const SHIFT_TIMES = {
  "ハ3": { start: "10:30", end: "19:30" },
  "オ5": { start: "11:30", end: "20:30" },
  "ハ1": { start: "09:30", end: "18:30" },
  "ハ5": { start: "12:30", end: "21:30" },
};
const ALL_CODES = ["オ5","ハ1","ハ3","ハ5","公休","有給","希望休"];
const DOW = ["日","月","火","水","木","金","土"];

let currentMode = null;
let imageBase64 = null;
let parsedData = null; // 解析結果（編集前の元データ）

/* ─── モード選択 ─── */
function selectMode(mode) {
  currentMode = mode;
  document.getElementById('btn-shift').classList.toggle('active', mode === 'shift');
  document.getElementById('btn-personal').classList.toggle('active', mode === 'personal');
  show('upload-section');
  imageBase64 = null;
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('upload-icon').style.display = 'block';
  document.getElementById('upload-hint').style.display = 'block';
  document.getElementById('file-input').value = '';
  hide('analyze-section');
  hide('edit-section');
  hideConfirm();
  hideResult();
}

/* ─── ファイル選択 ─── */
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  hide('edit-section');
  hideConfirm();
  hideResult();
  parsedData = null;

  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result.split(',')[1];
    const img = document.getElementById('preview-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('upload-icon').style.display = 'none';
    document.getElementById('upload-hint').style.display = 'none';
    show('analyze-section');
  };
  reader.readAsDataURL(file);
}

/* ─── 解析 ─── */
async function analyzeImage() {
  if (!imageBase64 || !currentMode) return;
  const btn = document.getElementById('btn-analyze');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>解析中...';
  hide('edit-section');
  hideConfirm();
  hideResult();

  const sysShift = `あなたはシフト表を読み取るアシスタントです。
画像から「石川」のシフト情報を読み取り、必ずJSON形式のみで返してください。
マークダウンのコードブロックは使用しないこと。
ルール：
- 対象者は「石川」固定
- 出勤区分（オ5、ハ1、ハ3、ハ5など）を抽出
- 公休・有給・希望休・斜線(/)・×などはすべてtype:"rest"として扱う
- 2回精査して正確に読み取ること
JSON形式：{"year":2025,"month":6,"shifts":[{"day":1,"type":"work","code":"オ5"},{"day":2,"type":"rest","code":"公休"}]}`;

  const sysPersonal = `あなたは予定を読み取るアシスタントです。
画像から予定・スケジュール情報を読み取り、必ずJSON形式のみで返してください。
マークダウンのコードブロックは使用しないこと。
JSON形式：{"events":[{"title":"予定のタイトル","date":"YYYY-MM-DD","startTime":"HH:MM","endTime":"HH:MM","allDay":false,"notes":""}]}
時間不明ならallDay:trueにしてstartTime/endTimeを空文字にすること。`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: currentMode === 'shift' ? sysShift : sysPersonal,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imageBase64 } },
            { type: "text", text: currentMode === 'shift' ? "このシフト表から石川のシフトを読み取ってください。" : "この画像から予定を読み取ってください。" }
          ]
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type === "text")?.text || "";
    const clean = text.replace(/```json|```/g, "").trim();
    parsedData = JSON.parse(clean);
    renderEditor();
    show('edit-section');
  } catch(e) {
    showResult(false, "画像の読み取りに失敗しました。もう一度お試しください。");
  }

  btn.disabled = false;
  btn.innerHTML = '🔍 画像を解析する';
}

function reAnalyze() {
  hide('edit-section');
  hideConfirm();
  hideResult();
  analyzeImage();
}

/* ─── エディタ描画 ─── */
function renderEditor() {
  if (!parsedData) return;

  if (currentMode === 'shift') {
    document.getElementById('personal-editor').style.display = 'none';
    document.getElementById('shift-editor').style.display = 'block';
    document.getElementById('edit-label').textContent = `STEP 4　内容を確認・修正 — ${parsedData.year}年${parsedData.month}月`;
    renderShiftRows();
  } else {
    document.getElementById('shift-editor').style.display = 'none';
    document.getElementById('personal-editor').style.display = 'block';
    document.getElementById('edit-label').textContent = 'STEP 4　内容を確認・修正';
    renderEventCards();
  }
}

function renderShiftRows() {
  const container = document.getElementById('shift-rows');
  container.innerHTML = '';
  const { year, month, shifts } = parsedData;

  (shifts || []).forEach((s, i) => {
    const d = new Date(year, month - 1, s.day);
    const dow = DOW[d.getDay()];
    const dowClass = d.getDay() === 0 ? 'dow-sun' : d.getDay() === 6 ? 'dow-sat' : 'dow-other';
    const isRest = s.type === 'rest';

    const optionsHtml = ALL_CODES.map(c =>
      `<option value="${c}" ${s.code === c ? 'selected' : ''}>${c}</option>`
    ).join('');

    const row = document.createElement('div');
    row.className = `edit-row ${isRest ? 'rest-row' : ''}`;
    row.id = `row-${i}`;
    row.innerHTML = `
      <span class="day-num">${s.day}</span>
      <span class="dow-cell ${dowClass}">${dow}</span>
      <select class="code-select ${isRest ? 'is-rest' : ''}" onchange="updateShiftCode(${i}, this.value)" id="sel-${i}">
        ${optionsHtml}
      </select>
      <button class="del-btn" onclick="deleteShiftRow(${i})" title="削除">✕</button>
    `;
    container.appendChild(row);
  });

  updateShiftMeta();
}

function updateShiftCode(idx, value) {
  const s = parsedData.shifts[idx];
  s.code = value;
  const isRest = ['公休','有給','希望休'].includes(value);
  s.type = isRest ? 'rest' : 'work';

  const row = document.getElementById(`row-${idx}`);
  row.className = `edit-row ${isRest ? 'rest-row' : ''}`;
  const sel = document.getElementById(`sel-${idx}`);
  sel.className = `code-select ${isRest ? 'is-rest' : ''}`;
  updateShiftMeta();
}

function deleteShiftRow(idx) {
  parsedData.shifts.splice(idx, 1);
  renderShiftRows();
}

function updateShiftMeta() {
  const work = parsedData.shifts.filter(s => s.type === 'work').length;
  const rest = parsedData.shifts.filter(s => s.type === 'rest').length;
  document.getElementById('shift-meta').innerHTML =
    `<span>🟦 出勤 ${work}日 → マイカレンダー</span><span>🟨 休み ${rest}日 → 共有</span>`;
}

/* ─── Personal cards ─── */
function renderEventCards() {
  const container = document.getElementById('event-cards');
  container.innerHTML = '';
  (parsedData.events || []).forEach((ev, i) => renderOneCard(ev, i));
}

function renderOneCard(ev, i) {
  const container = document.getElementById('event-cards');
  const card = document.createElement('div');
  card.className = 'edit-card';
  card.id = `card-${i}`;
  card.innerHTML = `
    <button class="card-del" onclick="deleteEventCard(${i})">✕</button>
    <label>タイトル</label>
    <input class="edit-input" value="${esc(ev.title)}" oninput="updateEvent(${i},'title',this.value)" placeholder="予定名">
    <label>日付</label>
    <input class="edit-input" type="date" value="${ev.date}" oninput="updateEvent(${i},'date',this.value)">
    <label>
      <input type="checkbox" ${ev.allDay ? 'checked' : ''} onchange="toggleAllDay(${i},this.checked)" style="margin-right:5px;">
      終日
    </label>
    <div class="time-row" id="time-row-${i}" style="${ev.allDay ? 'display:none' : ''}; margin-top:8px;">
      <div>
        <label>開始</label>
        <input class="edit-input" type="time" value="${ev.startTime||''}" oninput="updateEvent(${i},'startTime',this.value)" style="margin-bottom:0">
      </div>
      <div>
        <label>終了</label>
        <input class="edit-input" type="time" value="${ev.endTime||''}" oninput="updateEvent(${i},'endTime',this.value)" style="margin-bottom:0">
      </div>
    </div>
    ${ev.notes !== undefined ? `<label style="margin-top:8px;">メモ</label><input class="edit-input" value="${esc(ev.notes)}" oninput="updateEvent(${i},'notes',this.value)" placeholder="メモ（任意）" style="margin-bottom:0">` : ''}
  `;
  container.appendChild(card);
}

function updateEvent(i, key, val) {
  parsedData.events[i][key] = val;
}

function toggleAllDay(i, checked) {
  parsedData.events[i].allDay = checked;
  document.getElementById(`time-row-${i}`).style.display = checked ? 'none' : '';
}

function deleteEventCard(i) {
  parsedData.events.splice(i, 1);
  renderEventCards();
}

function addEventCard() {
  parsedData.events.push({ title: '', date: '', startTime: '', endTime: '', allDay: false, notes: '' });
  renderEventCards();
  // scroll to new card
  const cards = document.querySelectorAll('.edit-card');
  if (cards.length) cards[cards.length-1].scrollIntoView({ behavior: 'smooth', block: 'center' });
}

/* ─── 確認バナー ─── */
function showConfirm() {
  let summary = '';
  if (currentMode === 'shift') {
    const { year, month, shifts } = parsedData;
    const work = shifts.filter(s => s.type === 'work');
    const rest = shifts.filter(s => s.type === 'rest');
    summary = `【${year}年${month}月】\n`;
    summary += `・出勤 ${work.length}日 → マイカレンダー\n`;
    summary += `・休み ${rest.length}日 → 共有カレンダー\n\n`;
    summary += work.slice(0,5).map(s => `  ${s.day}日：${s.code}`).join('\n');
    if (work.length > 5) summary += `\n  …他 ${work.length - 5}件`;
  } else {
    const evs = parsedData.events || [];
    summary = `${evs.length}件の予定を共有カレンダーに登録します。\n\n`;
    summary += evs.slice(0,5).map(ev => `  ${ev.date}　${ev.title}`).join('\n');
    if (evs.length > 5) summary += `\n  …他 ${evs.length - 5}件`;
  }
  document.getElementById('confirm-body').textContent = summary;
  document.getElementById('confirm-banner').classList.add('visible');
  document.getElementById('confirm-banner').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeConfirm() {
  hideConfirm();
}

/* ─── カレンダー登録 ─── */
async function registerToCalendar() {
  hideConfirm();
  document.getElementById('registering-msg').style.display = 'block';
  hide('edit-section');

  const events = buildEvents();

  const prompt = currentMode === 'shift'
    ? `以下のイベントをGoogleカレンダーに登録してください。
- calendarTarget が "primary" のものはマイカレンダー（primary）に登録
- calendarTarget が "shared" のものは「共有」という名前のカレンダーに登録
- colorId:"5" が指定されたものはBanana（薄黄色）で登録
- allDay は使用しない。必ず時間指定（startTime/endTime）で登録する
- 1件ずつ順番に登録する
イベントデータ：${JSON.stringify(events)}`
    : `以下の私的な予定を「共有」カレンダーに登録してください。
- allDay:true の場合は終日イベントとして登録
- 1件ずつ順番に登録する
イベントデータ：${JSON.stringify(events)}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
        mcp_servers: [{ type: "url", url: "https://calendarmcp.googleapis.com/mcp/v1", name: "google-calendar" }]
      })
    });
    const data = await res.json();
    const text = data.content?.filter(b => b.type === "text").map(b => b.text).join("\n") || "登録が完了しました。";
    showResult(true, text);
  } catch(e) {
    show('edit-section');
    showResult(false, "登録中にエラーが発生しました。もう一度お試しください。");
  }

  document.getElementById('registering-msg').style.display = 'none';
}

function buildEvents() {
  const events = [];
  if (currentMode === 'shift') {
    const { year, month, shifts } = parsedData;
    for (const s of shifts) {
      const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(s.day).padStart(2,'0')}`;
      if (s.type === 'work') {
        const times = SHIFT_TIMES[s.code] || { start: "09:00", end: "18:00" };
        events.push({ calendarTarget: 'primary', title: s.code, startTime: pt(times.start, dateStr), endTime: pt(times.end, dateStr), type: 'work' });
      } else {
        events.push({ calendarTarget: 'shared', title: s.code || '公休', startTime: `${dateStr}T00:00:00+09:00`, endTime: `${dateStr}T23:59:00+09:00`, colorId: '5', type: 'rest' });
      }
    }
  } else {
    for (const ev of (parsedData.events || [])) {
      if (!ev.title || !ev.date) continue;
      events.push({
        calendarTarget: 'shared',
        title: ev.title,
        startTime: ev.allDay ? ev.date : pt(ev.startTime, ev.date),
        endTime: ev.allDay ? ev.date : pt(ev.endTime, ev.date),
        allDay: ev.allDay, notes: ev.notes, type: 'personal'
      });
    }
  }
  return events;
}

function pt(timeStr, dateStr) {
  if (!timeStr) return `${dateStr}T09:00:00+09:00`;
  const [h, m] = timeStr.split(":").map(Number);
  return `${dateStr}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00+09:00`;
}

/* ─── 結果表示 ─── */
function showResult(success, message) {
  const box = document.getElementById('result-box');
  box.className = `result-box visible ${success ? 'success' : 'error'}`;
  document.getElementById('result-title').textContent = success ? '✅ 登録完了' : '⚠️ エラー';
  document.getElementById('result-body').textContent = message;
  document.getElementById('btn-reset').style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function hideResult() {
  document.getElementById('result-box').className = 'result-box';
  document.getElementById('btn-reset').style.display = 'none';
}

/* ─── リセット ─── */
function resetAll() {
  currentMode = null; imageBase64 = null; parsedData = null;
  ['btn-shift','btn-personal'].forEach(id => document.getElementById(id).classList.remove('active'));
  ['upload-section','analyze-section','edit-section'].forEach(hide);
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('upload-icon').style.display = 'block';
  document.getElementById('upload-hint').style.display = 'block';
  document.getElementById('file-input').value = '';
  document.getElementById('registering-msg').style.display = 'none';
  hideConfirm();
  hideResult();
}

/* ─── utils ─── */
function show(id) { document.getElementById(id).classList.add('visible'); }
function hide(id) { document.getElementById(id).classList.remove('visible'); }
function hideConfirm() { document.getElementById('confirm-banner').classList.remove('visible'); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
</script>
