<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電卓</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }
  .calculator {
    width: 100%;
    max-width: 360px;
    background: #000;
    border-radius: 28px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .display {
    color: #fff;
    text-align: right;
    padding: 24px 12px 16px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .history {
    font-size: 20px;
    color: #888;
    min-height: 26px;
    word-break: break-all;
    margin-bottom: 6px;
  }
  .current {
    font-size: 64px;
    font-weight: 300;
    word-break: break-all;
    line-height: 1.1;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 12px;
  }
  button {
    border: none;
    border-radius: 50%;
    aspect-ratio: 1;
    font-size: 30px;
    font-weight: 500;
    cursor: pointer;
    transition: filter 0.1s, transform 0.05s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  button:active { transform: scale(0.94); filter: brightness(1.3); }
  .num { background: #333; color: #fff; }
  .func { background: #a5a5a5; color: #000; }
  .op { background: #ff9500; color: #fff; }
  .op.active { background: #fff; color: #ff9500; }
  .zero { aspect-ratio: auto; border-radius: 40px; grid-column: span 2; justify-content: flex-start; padding-left: 30px; }
</style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="history" id="history"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="buttons">
      <button class="func" data-action="clear">AC</button>
      <button class="func" data-action="negate">+/−</button>
      <button class="func" data-action="percent">%</button>
      <button class="op" data-op="÷">÷</button>

      <button class="num" data-num="7">7</button>
      <button class="num" data-num="8">8</button>
      <button class="num" data-num="9">9</button>
      <button class="op" data-op="×">×</button>

      <button class="num" data-num="4">4</button>
      <button class="num" data-num="5">5</button>
      <button class="num" data-num="6">6</button>
      <button class="op" data-op="−">−</button>

      <button class="num" data-num="1">1</button>
      <button class="num" data-num="2">2</button>
      <button class="num" data-num="3">3</button>
      <button class="op" data-op="+">+</button>

      <button class="num zero" data-num="0">0</button>
      <button class="num" data-action="decimal">.</button>
      <button class="op" data-action="equals">=</button>
    </div>
  </div>

<script>
  const currentEl = document.getElementById('current');
  const historyEl = document.getElementById('history');

  let current = '0';
  let previous = null;
  let operator = null;
  let resetNext = false;

  function format(n) {
    if (n === 'Error') return n;
    let num = parseFloat(n);
    if (isNaN(num)) return n;
    // 小数の余分な桁を整理しつつ、整数部はカンマ区切り
    let str = n.toString();
    if (str.includes('.')) {
      let [int, dec] = str.split('.');
      return Number(int).toLocaleString('en-US') + '.' + dec;
    }
    return num.toLocaleString('en-US', { maximumFractionDigits: 10 });
  }

  function updateDisplay() {
    currentEl.textContent = format(current);
    // フォントサイズ自動調整
    const len = currentEl.textContent.length;
    currentEl.style.fontSize = len > 9 ? (len > 12 ? '40px' : '52px') : '64px';
  }

  function calculate(a, b, op) {
    a = parseFloat(a); b = parseFloat(b);
    switch(op) {
      case '+': return a + b;
      case '−': return a - b;
      case '×': return a * b;
      case '÷': return b === 0 ? 'Error' : a / b;
    }
  }

  function clearActiveOp() {
    document.querySelectorAll('.op').forEach(b => b.classList.remove('active'));
  }

  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const num = btn.dataset.num;
      const op = btn.dataset.op;
      const action = btn.dataset.action;

      if (num !== undefined) {
        if (current === '0' || resetNext) { current = num; resetNext = false; }
        else current += num;
        clearActiveOp();
      }

      else if (action === 'decimal') {
        if (resetNext) { current = '0'; resetNext = false; }
        if (!current.includes('.')) current += '.';
        clearActiveOp();
      }

      else if (action === 'clear') {
        current = '0'; previous = null; operator = null; resetNext = false;
        historyEl.textContent = '';
        clearActiveOp();
      }

      else if (action === 'negate') {
        current = (parseFloat(current) * -1).toString();
      }

      else if (action === 'percent') {
        current = (parseFloat(current) / 100).toString();
      }

      else if (op) {
        if (operator && !resetNext) {
          const result = calculate(previous, current, operator);
          current = result.toString();
          previous = result.toString();
        } else {
          previous = current;
        }
        operator = op;
        resetNext = true;
        historyEl.textContent = format(previous) + ' ' + op;
        clearActiveOp();
        btn.classList.add('active');
      }

      else if (action === 'equals') {
        if (operator !== null && previous !== null) {
          const result = calculate(previous, current, operator);
          historyEl.textContent = format(previous) + ' ' + operator + ' ' + format(current) + ' =';
          current = result.toString();
          previous = null;
          operator = null;
          resetNext = true;
          clearActiveOp();
        }
      }

      updateDisplay();
    });
  });

  // キーボード対応
  document.addEventListener('keydown', (e) => {
    const k = e.key;
    const map = { '/': '÷', '*': '×', '-': '−', '+': '+' };
    if (/[0-9]/.test(k)) document.querySelector(`[data-num="${k}"]`)?.click();
    else if (map[k]) document.querySelector(`[data-op="${map[k]}"]`)?.click();
    else if (k === '.') document.querySelector('[data-action="decimal"]')?.click();
    else if (k === 'Enter' || k === '=') document.querySelector('[data-action="equals"]')?.click();
    else if (k === 'Escape') document.querySelector('[data-action="clear"]')?.click();
    else if (k === '%') document.querySelector('[data-action="percent"]')?.click();
  });

  updateDisplay();
</script>
</body>
</html>
